name: Watch DLF NTH Kakkanad

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: watch-dlf-nth
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          CONTACT_NUMBER: ${{ secrets.CONTACT_NUMBER }}
        run: python main.py

      - name: Commit updated seen ids
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/seen_ids.json; then
            git add data/seen_ids.json
            git commit -m "chore: update seen ad ids [skip ci]"
            git push
          else
            echo "No changes to seen_ids.json"
          fi
